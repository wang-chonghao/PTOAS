name: Build Wheel (macOS)

on:
  push:
    tags-ignore:
      - '**'
  # Nightly build & publish (UTC time, offset from Linux workflow).
  schedule:
    - cron: "40 17 * * *"
  workflow_dispatch:
  release:
    types: [prereleased, released]

permissions:
  contents: write

env:
  LLVM_REPO: https://github.com/vpto-dev/llvm-project.git
  LLVM_REF: feature-vpto
  LLVM_CACHE_FLAVOR: release-v2

jobs:
  build_wheel:
    # Wheel publication is paused, but this job still builds and uploads the
    # packaged ptoas binary distribution.
    name: Build ptoas-bin (macOS ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'x86_64' && 'macos-15-intel' || 'macos-26' }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11"]
        arch: ["x86_64", "aarch64"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select runner metadata
        id: runner-meta
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            echo "label=macos-15-intel" >> "$GITHUB_OUTPUT"
          else
            echo "label=macos-26" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set Python path
        run: |
          echo "PY_PATH=$(python -c 'import sys; print(sys.prefix)')" >> $GITHUB_ENV

      - name: Compute PTOAS CLI version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            EXPECTED_RELEASE_VERSION="$(python .github/scripts/compute_ptoas_version.py --mode release)"
            PTOAS_VERSION="${GITHUB_REF_NAME#v}"
            if [ "${PTOAS_VERSION}" != "${EXPECTED_RELEASE_VERSION}" ]; then
              echo "release tag '${GITHUB_REF_NAME}' does not match computed version '${EXPECTED_RELEASE_VERSION}'" >&2
              exit 1
            fi
          else
            PTOAS_VERSION="$(python .github/scripts/compute_ptoas_version.py --mode dev)"
          fi
          echo "PTOAS_VERSION=${PTOAS_VERSION}" >> "$GITHUB_ENV"
          echo "Using PTOAS CLI version: ${PTOAS_VERSION}"

      - name: Install system dependencies
        run: |
          brew install ninja ccache

      - name: Install Python dependencies
        run: |
          # LLVM/MLIR Python bindings are not yet compatible with pybind11 3.x
          # (see pybind11 static_assert on def_property + keep_alive).
          pip install --no-cache-dir numpy 'pybind11<3' nanobind setuptools wheel delocate

      - name: Set build directories
        run: |
          echo "WORKSPACE_DIR=${RUNNER_TEMP}/llvm-workspace" >> $GITHUB_ENV
          echo "LLVM_SOURCE_DIR=${RUNNER_TEMP}/llvm-workspace/llvm-project" >> $GITHUB_ENV
          echo "LLVM_BUILD_DIR=${RUNNER_TEMP}/llvm-workspace/llvm-project/build-release" >> $GITHUB_ENV
          echo "PTO_SOURCE_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "PTO_BUILD_DIR=$GITHUB_WORKSPACE/build-release" >> $GITHUB_ENV
          echo "PTO_INSTALL_DIR=$GITHUB_WORKSPACE/install-release" >> $GITHUB_ENV

      - name: Resolve LLVM source SHA
        id: llvm-source
        run: |
          LLVM_SOURCE_SHA="$(git ls-remote "${LLVM_REPO}" "refs/heads/${LLVM_REF}" | awk '{print $1}')"
          if [ -z "${LLVM_SOURCE_SHA}" ]; then
            echo "ERROR: failed to resolve ${LLVM_REPO} ${LLVM_REF}" >&2
            exit 1
          fi
          echo "sha=${LLVM_SOURCE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Restore LLVM build cache (exact key)
        id: cache-llvm
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/llvm-workspace/llvm-project/build-release
          key: llvm-${{ steps.llvm-source.outputs.sha }}-${{ steps.runner-meta.outputs.label }}-${{ matrix.arch }}-${{ matrix.python }}-${{ env.LLVM_CACHE_FLAVOR }}

      - name: Prepare LLVM source
        run: |
          mkdir -p $LLVM_SOURCE_DIR
          cd $LLVM_SOURCE_DIR
          if [ ! -d .git ]; then
            git init
            git remote add origin "${LLVM_REPO}"
          fi
          git remote set-url origin "${LLVM_REPO}"
          git fetch --depth 1 origin "${LLVM_REF}"
          git checkout --force FETCH_HEAD

      - name: Warn when default-branch cache is missing for PR/release runs
        if: steps.cache-llvm.outputs.cache-hit != 'true' && (github.event_name == 'pull_request' || github.event_name == 'release')
        run: |
          echo "LLVM cache miss while running on PR/release."
          echo "PR/release runs are cache-consumers only and should reuse cache generated on the default branch."
          echo "Please run this workflow on the default branch first to populate cache key:"
          echo "llvm-${{ steps.llvm-source.outputs.sha }}-${{ steps.runner-meta.outputs.label }}-${{ matrix.arch }}-${{ matrix.python }}-${{ env.LLVM_CACHE_FLAVOR }}"

      - name: Build LLVM/MLIR
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          cd $LLVM_SOURCE_DIR
          cmake -G Ninja -S llvm -B $LLVM_BUILD_DIR \
            -DLLVM_ENABLE_PROJECTS="mlir;clang" \
            -DBUILD_SHARED_LIBS=ON \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DMLIR_ENABLE_BINDINGS_PYTHON=ON \
            -DPython3_EXECUTABLE=$(which python) \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_TARGETS_TO_BUILD="host"
          ninja -C $LLVM_BUILD_DIR

      # Upload cache immediately after the build step to avoid later steps polluting the release build tree.
      - name: Save LLVM cache
        # Allow cache writes except for PR/release runs to avoid duplicated tag/merge caches.
        if: steps.cache-llvm.outputs.cache-hit != 'true' && github.event_name != 'pull_request' && github.event_name != 'release'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/llvm-workspace/llvm-project/build-release
          key: llvm-${{ steps.llvm-source.outputs.sha }}-${{ steps.runner-meta.outputs.label }}-${{ matrix.arch }}-${{ matrix.python }}-${{ env.LLVM_CACHE_FLAVOR }}

      - name: Build PTOAS
        run: |
          PTOAS_RELEASE_VERSION_OVERRIDE="${PTOAS_VERSION}" \
          pip install . --no-build-isolation

      - name: Create Python wheel
        if: false
        run: |
          export PTO_WHEEL_DIST_DIR=$PTO_SOURCE_DIR/build/wheel-dist
          export PTOAS_PYTHON_PACKAGE_VERSION="${PTOAS_VERSION}"
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            TARGET_ARCH="x86_64"
          else
            TARGET_ARCH="arm64"
          fi
          # setup-python may provide a universal2 interpreter on macOS.
          # Force a single-arch wheel tag to match the matrix target and delocate checks.
          export WHEEL_PLAT_NAME=$(python "$PTO_SOURCE_DIR/docker/get_macos_wheel_plat_name.py" "$TARGET_ARCH")
          bash $PTO_SOURCE_DIR/docker/create_wheel.sh
          shopt -s nullglob
          built_wheels=("$PTO_WHEEL_DIST_DIR"/ptoas*.whl)
          if [ "${#built_wheels[@]}" -gt 0 ]; then
            printf 'Built wheel file: %s\n' "$(basename "${built_wheels[0]}")"
          fi

      - name: Repair wheel with delocate
        if: false
        run: |
          set -euo pipefail
          export PTO_WHEEL_DIST_DIR=$PTO_SOURCE_DIR/build/wheel-dist
          export PTO_WHEELHOUSE=$GITHUB_WORKSPACE/wheelhouse
          mkdir -p "$PTO_WHEELHOUSE"
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            REQUIRED_ARCH="x86_64"
          else
            REQUIRED_ARCH="arm64"
          fi
          shopt -s nullglob
          wheels=("$PTO_WHEEL_DIST_DIR"/ptoas*.whl)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel in $PTO_WHEEL_DIST_DIR, found ${#wheels[@]}:"
            printf '  %s\n' "${wheels[@]}"
            exit 1
          fi

          echo "Runner label: ${{ steps.runner-meta.outputs.label }}"
          echo "Wheel size:"
          du -sh "${wheels[0]}"
          echo "dist contents:"
          ls -lh "$PTO_WHEEL_DIST_DIR"
          echo "delocate dependency summary:"
          delocate-listdeps "${wheels[0]}" || true

          delocate-wheel \
            --require-archs "${REQUIRED_ARCH}" \
            --wheel-dir "$PTO_WHEELHOUSE" \
            "${wheels[0]}" &
          delocate_pid=$!

          (
            sleep 4500
            if kill -0 "$delocate_pid" 2>/dev/null; then
              echo "ERROR: delocate-wheel exceeded 75 minutes, terminating pid ${delocate_pid}"
              kill -TERM "$delocate_pid" 2>/dev/null || true
              sleep 15
              kill -KILL "$delocate_pid" 2>/dev/null || true
            fi
          ) &
          watchdog_pid=$!

          while kill -0 "$delocate_pid" 2>/dev/null; do
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] delocate still running (pid=${delocate_pid})"
            ps -o pid=,ppid=,%cpu=,%mem=,etime=,command= -p "$delocate_pid" || true
            du -sh "$PTO_WHEEL_DIST_DIR" "$PTO_WHEELHOUSE" 2>/dev/null || true
            sleep 60
          done

          set +e
          wait "$delocate_pid"
          rc=$?
          set -e

          kill "$watchdog_pid" 2>/dev/null || true
          wait "$watchdog_pid" 2>/dev/null || true

          if [ "$rc" -ne 0 ]; then
            echo "delocate-wheel failed with rc=${rc}"
            echo "Active Python processes:"
            ps -ax -o pid=,ppid=,%cpu=,%mem=,etime=,command= | grep -E '[d]elocate|[p]ython' || true
            echo "Filesystem usage:"
            df -h .
            echo "dist contents after failure:"
            ls -lh "$PTO_WHEEL_DIST_DIR" || true
            echo "wheelhouse contents after failure:"
            ls -lh "$PTO_WHEELHOUSE" || true
            exit "$rc"
          fi

          echo "wheelhouse contents:"
          ls -lh "$PTO_WHEELHOUSE"

      - name: Test wheel installation
        if: false
        run: |
          pip install $GITHUB_WORKSPACE/wheelhouse/ptoas*.whl
          export DYLD_LIBRARY_PATH=$LLVM_BUILD_DIR/lib:$PTO_INSTALL_DIR/lib:${DYLD_LIBRARY_PATH}
          bash $PTO_SOURCE_DIR/docker/test_wheel_imports.sh

      - name: Test ptoas CLI
        run: |
          export DYLD_LIBRARY_PATH=$LLVM_BUILD_DIR/lib:$PTO_INSTALL_DIR/lib:${DYLD_LIBRARY_PATH}
          bash $PTO_SOURCE_DIR/docker/test_ptoas_cli.sh

      - name: Copy wheel to workspace
        if: false
        run: |
          mkdir -p $GITHUB_WORKSPACE/wheelhouse
          if ! compgen -G "$GITHUB_WORKSPACE/wheelhouse/ptoas*.whl" >/dev/null; then
            cp $PTO_SOURCE_DIR/build/wheel-dist/ptoas*.whl $GITHUB_WORKSPACE/wheelhouse/
          fi

      - name: Upload wheel artifact
        if: false
        uses: actions/upload-artifact@v4
        with:
          name: ptoas-wheel-macos-py${{ matrix.python }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

      - name: Collect ptoas binary and dependencies
        run: |
          bash "$PTO_SOURCE_DIR/docker/collect_ptoas_dist_mac.sh" "$GITHUB_WORKSPACE/ptoas-dist"

      - name: Archive ptoas binary artifact
        run: |
          chmod +x "$GITHUB_WORKSPACE/ptoas-dist/ptoas" "$GITHUB_WORKSPACE/ptoas-dist/bin/ptoas"
          tar -czf "$GITHUB_WORKSPACE/ptoas-bin-macos-${{ matrix.arch }}.tar.gz" \
            -C "$GITHUB_WORKSPACE/ptoas-dist" .

      - name: Smoke test archived ptoas binary artifact
        run: |
          TEST_DIR="$RUNNER_TEMP/ptoas-dist-smoke-${{ matrix.arch }}"
          rm -rf "$TEST_DIR"
          mkdir -p "$TEST_DIR/extracted"
          tar -xzf "$GITHUB_WORKSPACE/ptoas-bin-macos-${{ matrix.arch }}.tar.gz" -C "$TEST_DIR/extracted"

          test -x "$TEST_DIR/extracted/ptoas"
          test -x "$TEST_DIR/extracted/bin/ptoas"

          env -u PYTHONPATH -u DYLD_LIBRARY_PATH -u LD_LIBRARY_PATH \
            "$TEST_DIR/extracted/ptoas" --version
          env -u PYTHONPATH -u DYLD_LIBRARY_PATH -u LD_LIBRARY_PATH \
            "$TEST_DIR/extracted/ptoas" \
            "$PTO_SOURCE_DIR/test/lit/pto/kernel_kind_vector_scf_while_emitc.pto" \
            >/dev/null

      - name: Smoke test wheel imports after collecting artifacts
        if: false
        run: |
          # Test the copied wheel artifact from an isolated env with no build-tree
          # paths, so post-collect/release regressions (e.g. ARM cs_invalid_page)
          # are caught before upload.
          brew install uv
          uv python install 3.11
          TEST_DIR="$RUNNER_TEMP/wheel-smoke-test"
          VENV_DIR="$TEST_DIR/.venv"
          mkdir -p "$TEST_DIR"
          cd "$TEST_DIR"
          uv venv --python 3.11 "$VENV_DIR"
          source "$VENV_DIR/bin/activate"

          unset PYTHONPATH
          unset DYLD_LIBRARY_PATH
          unset LD_LIBRARY_PATH

          shopt -s nullglob
          wheels=("$GITHUB_WORKSPACE"/wheelhouse/ptoas*.whl)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel in \$GITHUB_WORKSPACE/wheelhouse, found ${#wheels[@]}:"
            printf '  %s\n' "${wheels[@]}"
            exit 1
          fi
          uv pip install "${wheels[0]}"

          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            DYLD_PRINT_LIBRARIES=1 python -c "import mlir.ir; print('mlir.ir imported successfully')"
            DYLD_PRINT_LIBRARIES=1 python -c "from mlir.dialects import pto; print('pto dialect imported successfully')"
          else
            python -c "import mlir.ir; print('mlir.ir imported successfully')"
            python -c "from mlir.dialects import pto; print('pto dialect imported successfully')"
          fi

      - name: Upload ptoas binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptoas-bin-macos-${{ matrix.arch }}
          path: ptoas-bin-macos-${{ matrix.arch }}.tar.gz

  upload_release_assets:
    # Disabled together with build_wheel because wheel publication is paused.
    if: false
    name: Upload release assets
    needs: build_wheel
    runs-on: ubuntu-latest

    steps:
      - name: Compute release metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=false" >> "$GITHUB_ENV"
            echo "RELEASE_MAKE_LATEST=true" >> "$GITHUB_ENV"
            {
              echo "RELEASE_BODY<<EOF"
              echo "Published release assets for ${GITHUB_REF_NAME}."
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=nightly" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=Nightly Build" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"
            echo "RELEASE_MAKE_LATEST=false" >> "$GITHUB_ENV"
            {
              echo "RELEASE_BODY<<EOF"
              echo "Automated nightly build."
              echo ""
              echo "- Commit: ${GITHUB_SHA}"
              echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo "- Date (UTC): $(date -u +'%Y-%m-%d %H:%M:%S')"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ptoas-wheel-macos-*
          path: release-artifacts
          merge-multiple: true

      - name: Download x86_64 binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ptoas-bin-macos-x86_64
          path: release-artifacts/ptoas-bin-macos-x86_64

      - name: Download aarch64 binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ptoas-bin-macos-aarch64
          path: release-artifacts/ptoas-bin-macos-aarch64

      - name: Collect packaged ptoas binaries
        run: |
          set -euo pipefail
          mv "release-artifacts/ptoas-bin-macos-x86_64/ptoas-bin-macos-x86_64.tar.gz" \
            "release-artifacts/ptoas-bin-macos-x86_64.tar.gz"
          mv "release-artifacts/ptoas-bin-macos-aarch64/ptoas-bin-macos-aarch64.tar.gz" \
            "release-artifacts/ptoas-bin-macos-aarch64.tar.gz"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          make_latest: ${{ env.RELEASE_MAKE_LATEST }}
          body: ${{ env.RELEASE_BODY }}
          overwrite_files: true
          files: |
            release-artifacts/*.whl
            release-artifacts/*.tar.gz
