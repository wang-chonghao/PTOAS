name: Update pto-isa pin

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-pto-isa-pin:
    if: github.repository == 'hw-native-sys/PTOAS'
    runs-on: ubuntu-22.04
    env:
      AUTOMATION_TOKEN: ${{ secrets.WORKFLOW_BOT_TOKEN || secrets.RELEASE_BOT_TOKEN || '' }}
    steps:
      - name: Validate automation token
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUTOMATION_TOKEN}" ]; then
            echo "ERROR: missing WORKFLOW_BOT_TOKEN or RELEASE_BOT_TOKEN secret"
            echo "This workflow updates .github/workflows/ci.yml, so it must use a bot token with workflow-file write access."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ env.AUTOMATION_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update pinned pto-isa commit
        id: update
        shell: bash
        run: |
          set -euo pipefail
          sha="$(python .github/scripts/update_pto_isa_pin.py)"
          python .github/scripts/update_pto_isa_pin.py --commit "${sha}" --check
          echo "pto_isa_commit=${sha}" >> "${GITHUB_OUTPUT}"
          echo "pto_isa_short=${sha:0:12}" >> "${GITHUB_OUTPUT}"

      - name: Commit pinned pto-isa update
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/workflows/ci.yml docker/Dockerfile; then
            echo "pto-isa pin already up to date."
            echo "created_commit=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml docker/Dockerfile
          git commit -m "chore(ci): bump pto-isa pin to ${{ steps.update.outputs.pto_isa_short }}"
          echo "created_commit=true" >> "${GITHUB_OUTPUT}"

      - name: Push pinned pto-isa update
        if: steps.commit.outputs.created_commit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:${{ github.event.repository.default_branch }}
